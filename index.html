<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>猎头工作台</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --color-background-primary:#ffffff;--color-background-secondary:#f5f5f4;--color-background-tertiary:#eeece8;
  --color-background-info:#e6f1fb;--color-background-success:#eaf3de;--color-background-warning:#faeeda;--color-background-danger:#fcebeb;
  --color-text-primary:#1a1a1a;--color-text-secondary:#666660;--color-text-tertiary:#999994;
  --color-text-info:#0c447c;--color-text-success:#27500a;--color-text-warning:#633806;--color-text-danger:#791f1f;
  --color-border-tertiary:rgba(0,0,0,0.1);--color-border-secondary:rgba(0,0,0,0.2);--color-border-info:#378ADD;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--font-mono:'SF Mono','Consolas',monospace;
  --border-radius-md:8px;--border-radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --color-background-primary:#1e1e1c;--color-background-secondary:#272724;--color-background-tertiary:#2e2e2b;
  --color-background-info:#042c53;--color-background-success:#173404;--color-background-warning:#412402;--color-background-danger:#501313;
  --color-text-primary:#e8e8e4;--color-text-secondary:#a0a09a;--color-text-tertiary:#666660;
  --color-text-info:#85b7eb;--color-text-success:#97c459;--color-text-warning:#ef9f27;--color-text-danger:#f09595;
  --color-border-tertiary:rgba(255,255,255,0.1);--color-border-secondary:rgba(255,255,255,0.2);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary);height:100dvh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh}
.topbar{height:52px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.topbar-back{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);padding:4px 8px 4px 0;display:none;align-items:center;gap:4px;font-size:13px}
.topbar-back.visible{display:flex}
.topbar-title{font-size:14px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:12px;color:var(--color-text-tertiary);flex-shrink:0}
.topbar-addbtn{background:none;border:0.5px solid var(--color-border-secondary);cursor:pointer;color:var(--color-text-secondary);padding:4px 9px;display:flex;align-items:center;gap:3px;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;flex-shrink:0}
.topbar-addbtn:active{background:var(--color-background-secondary)}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column}
.sidebar-head{padding:12px 12px 6px;display:flex;align-items:center;justify-content:space-between}
.sidebar-head span{font-size:11px;color:var(--color-text-tertiary);font-weight:500;letter-spacing:.04em}
.sidebar-addbtn{background:none;border:0.5px solid var(--color-border-secondary);cursor:pointer;color:var(--color-text-secondary);padding:3px 8px;display:flex;align-items:center;gap:3px;border-radius:var(--border-radius-md);font-size:11px;font-weight:500;flex-shrink:0}
.sidebar-addbtn:active{background:var(--color-background-secondary)}
.sidebar-list{flex:1;overflow-y:auto;padding:4px 8px 8px;-webkit-overflow-scrolling:touch}
.jd-item{padding:10px 8px;border-radius:var(--border-radius-md);cursor:pointer;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between}
.jd-item:hover,.jd-item:active{background:var(--color-background-secondary)}
.jd-item.active{background:var(--color-background-info)}
.jd-item.active .jd-name{color:var(--color-text-info)}
.jd-item.active .jd-meta{color:var(--color-text-info);opacity:.7}
.jd-item-left{flex:1;min-width:0}
.jd-name{font-size:13px;font-weight:500;line-height:1.4;color:var(--color-text-primary)}
.jd-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.center{flex-shrink:0;display:flex;overflow:hidden}
.list-panel{width:270px;flex-shrink:0;display:flex;flex-direction:column;border-right:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.list-head{padding:12px 14px 10px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.list-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.list-title{font-size:13px;font-weight:500}
.list-meta{font-size:11px;color:var(--color-text-secondary)}
.jd-btn{font-size:12px;padding:5px 8px 5px 10px;cursor:pointer;display:flex;align-items:center;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);white-space:nowrap;margin-top:8px;width:100%;justify-content:space-between}
.jd-btn:active{background:var(--color-background-secondary)}
.jd-btn .left{display:flex;align-items:center;gap:5px}
.jd-btn-arrow{font-size:15px;transition:transform .22s cubic-bezier(.4,0,.2,1)}
.jd-btn-arrow.open{transform:rotate(180deg)}
.list-actions{display:flex;gap:6px;margin-top:7px}
.list-act-btn{flex:1;font-size:11px;padding:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary)}
.list-act-btn:active{background:var(--color-background-secondary)}
.sort-row{display:flex;align-items:center;gap:6px;padding:7px 14px;flex-shrink:0}
.sort-add-btn{margin-left:auto;font-size:11px;padding:3px 9px;cursor:pointer;display:flex;align-items:center;gap:4px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary)}
.sort-add-btn:active{background:var(--color-background-secondary)}
.sort-lbl{font-size:11px;color:var(--color-text-tertiary)}
.sort-btn{font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);border:0.5px solid transparent;background:transparent;color:var(--color-text-secondary);cursor:pointer}
.sort-btn.on{background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.clist{flex:1;overflow-y:auto;padding:6px 8px;-webkit-overflow-scrolling:touch}
.ccard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px;margin-bottom:6px;cursor:pointer;display:flex;gap:9px;transition:border-color .1s}
.ccard:active{border-color:var(--color-border-secondary)}
.ccard.sel{border-color:var(--color-border-info);border-width:1.5px}
.av{width:34px;height:34px;border-radius:50%;background:var(--color-background-info);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--color-text-info);flex-shrink:0}
.cb{flex:1;min-width:0}
.ct{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.cn{font-size:12px;font-weight:500}
.bdg{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:500}
.cd{font-size:11px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.minibar-row{display:flex;gap:3px;margin-top:5px}
.minibar{flex:1;height:2px;border-radius:1px;background:var(--color-border-tertiary);overflow:hidden}
.minibar-fill{height:100%;border-radius:1px}
.right-area{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column}
.detail{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--color-background-primary)}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--color-text-tertiary);gap:10px}
.detail-empty i{font-size:32px}
.detail-empty p{font-size:13px}
.detail-head{padding:14px 18px 12px;border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.dh-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.dh-av{width:44px;height:44px;border-radius:50%;background:var(--color-background-info);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;color:var(--color-text-info);flex-shrink:0}
.dh-info{flex:1;min-width:0}
.dh-name{font-size:15px;font-weight:500;margin-bottom:3px}
.dh-sub{font-size:12px;color:var(--color-text-secondary)}
.dh-score{text-align:right;flex-shrink:0}
.dh-score-num{font-size:26px;font-weight:500;line-height:1}
.dh-score-lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.info-row{display:flex;gap:6px;flex-wrap:wrap}
.info-tag{font-size:11px;padding:3px 8px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-secondary);display:flex;align-items:center;gap:3px}
.detail-body{flex:1;overflow-y:auto;padding:14px 18px;-webkit-overflow-scrolling:touch}
.section{margin-bottom:18px}
.sec-title{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.04em;margin-bottom:8px}
.summary-box{background:var(--color-background-secondary);padding:10px 12px;font-size:13px;line-height:1.65;border-left:2px solid var(--color-border-info)}
.dim-row{margin-bottom:10px}
.dim-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.dim-name{font-size:12px;font-weight:500}
.dim-score{font-size:12px;font-weight:500}
.dim-bar{height:5px;border-radius:3px;background:var(--color-background-secondary);overflow:hidden;margin-bottom:3px}
.dim-fill{height:100%;border-radius:3px}
.dim-comment{font-size:11px;color:var(--color-text-secondary)}
.raw-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:11px;font-family:var(--font-mono);color:var(--color-text-secondary);line-height:1.7;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.detail-foot{padding:10px 18px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.btn-xs{font-size:11px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary)}
.btn-xs:active{background:var(--color-background-secondary)}
.btn-xs.pri{background:var(--color-background-info);border-color:transparent;color:var(--color-text-info)}
.btn-xs.danger{color:var(--color-text-danger)}
.jd-drawer{position:absolute;top:0;right:0;bottom:0;width:100%;background:var(--color-background-primary);border-left:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;z-index:10;transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1)}
.jd-drawer.open{transform:translateX(0)}
.drawer-head{padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 110px)}
.drawer-head-actions{display:flex;gap:4px;flex-shrink:0}
.drawer-close{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);padding:5px;display:flex;align-items:center;border-radius:5px}
.drawer-tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.dtab{font-size:12px;padding:9px 16px;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
.dtab.on{color:var(--color-text-primary);font-weight:500;border-bottom-color:var(--color-text-primary)}
.drawer-body{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}
.raw-jd{font-size:12px;line-height:1.8;color:var(--color-text-primary);white-space:pre-wrap;font-family:var(--font-mono)}
.analysis-section{margin-bottom:20px}
.as-title{font-size:12px;font-weight:500;margin-bottom:8px;padding-bottom:5px;border-bottom:0.5px solid var(--color-border-tertiary)}
.as-body{font-size:12px;color:var(--color-text-secondary);line-height:1.7}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.tag{font-size:11px;padding:3px 9px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-secondary)}
.tag.must{background:var(--color-background-danger);color:var(--color-text-danger)}
.tag.good{background:var(--color-background-success);color:var(--color-text-success)}
.tag.co{background:var(--color-background-info);color:var(--color-text-info)}
.warn-box{background:var(--color-background-warning);border-radius:var(--border-radius-md);padding:8px 12px;font-size:12px;color:var(--color-text-warning);line-height:1.6;margin-top:6px}
/* 弹层 */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.modal-mask.show{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);width:100%;max-width:520px;max-height:85dvh;display:flex;flex-direction:column;overflow:hidden}
.modal-head{padding:14px 18px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:14px;font-weight:500}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 18px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;margin-bottom:5px;color:var(--color-text-secondary)}
.field input,.field textarea{width:100%;font-size:13px;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans)}
.field textarea{resize:vertical;font-family:var(--font-mono);font-size:12px;line-height:1.6}
.btn{font-size:13px;padding:8px 16px;cursor:pointer;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary)}
.btn:active{background:var(--color-background-secondary)}
.btn.pri{background:var(--color-background-info);border-color:transparent;color:var(--color-text-info)}
.hint{font-size:11px;color:var(--color-text-tertiary);line-height:1.6;margin-top:4px}
.loading-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--color-background-tertiary);z-index:200;color:var(--color-text-secondary);font-size:13px}
.spin{width:24px;height:24px;border:2.5px solid var(--color-border-secondary);border-top-color:var(--color-text-info);border-radius:50%;animation:sp 0.7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--color-text-primary);color:var(--color-background-primary);font-size:13px;padding:10px 18px;border-radius:var(--border-radius-md);z-index:300;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:768px){
  .sidebar{position:absolute;top:52px;left:0;right:0;bottom:0;width:100%;border-right:none;z-index:5;transform:translateX(0);transition:transform .25s cubic-bezier(.4,0,.2,1)}
  .sidebar.hidden{transform:translateX(-100%)}
  .center{position:absolute;top:52px;left:0;right:0;bottom:0;z-index:6;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
  .center.visible{transform:translateX(0)}
  .list-panel{width:100%;border-right:none}
  .right-area{position:absolute;top:52px;left:0;right:0;bottom:0;z-index:7;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
  .right-area.visible{transform:translateX(0)}
  .topbar-sub{display:none}
  .jd-drawer{border-left:none}
  .ccard{padding:12px 10px}
  .jd-item{padding:12px 8px}
  .btn-xs{padding:8px 12px;font-size:12px}
  /* 移动端弹层：fixed钉死四边，不依赖dvh */
  .modal-mask{padding:0;display:none}
  .modal-mask.show{display:block}
  .modal{position:fixed;top:0;left:0;right:0;bottom:0;max-width:none;max-height:none;width:auto;height:auto;border-radius:0;display:flex;flex-direction:column}
  .modal-head{flex-shrink:0}
  .modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .modal-foot{flex-shrink:0}
  .modal-head .drawer-close{padding:8px;margin:-4px}
}
</style>
</head>
<body>
<div class="loading-screen" id="loading"><div class="spin"></div><span>加载数据中…</span></div>
<div class="app">
  <div class="topbar">
    <button class="topbar-back" id="back-btn" onclick="goBack()"><i class="ti ti-arrow-left" style="font-size:16px"></i><span id="back-label">返回</span></button>
    <span class="topbar-title" id="topbar-title">猎头工作台</span>
    <span class="topbar-sub" id="topbar-sub"></span>
  </div>
  <div class="body">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head"><span>岗位列表</span><button class="sidebar-addbtn" onclick="openJdModal()"><i class="ti ti-plus" style="font-size:11px"></i>JD</button></div>
      <div class="sidebar-list" id="jd-list"></div>
    </aside>
    <div class="center" id="center">
      <div class="list-panel">
        <div class="list-head">
          <div class="list-head-row">
            <span class="list-title" id="lp-title">—</span>
            <span id="lp-meta" class="list-meta"></span>
          </div>
          <button class="jd-btn" onclick="toggleDrawer()">
            <span class="left"><i class="ti ti-file-description" style="font-size:13px"></i>查看岗位要求</span>
            <i class="ti ti-arrow-right jd-btn-arrow" id="jd-btn-arrow"></i>
          </button>
        </div>
        <div class="sort-row">
          <span class="sort-lbl">排序：</span>
          <button class="sort-btn on" id="s-score" onclick="setSort('score')">评分</button>
          <button class="sort-btn" id="s-date" onclick="setSort('date')">导入时间</button>
          <button class="sort-add-btn" onclick="openResumeModal()"><i class="ti ti-user-plus" style="font-size:12px"></i>添加简历</button>
        </div>
        <div class="clist" id="clist"></div>
      </div>
    </div>
    <div class="right-area" id="right-area">
      <div class="detail" id="detail-panel"><div class="detail-empty"><i class="ti ti-user"></i><p>点击候选人查看详情</p></div></div>
      <div class="jd-drawer" id="jd-drawer">
        <div class="drawer-head">
          <span class="drawer-title" id="drawer-title">岗位要求</span>
          <div class="drawer-head-actions">
            <button class="drawer-close" onclick="editCurrentJd()" title="编辑"><i class="ti ti-edit" style="font-size:15px"></i></button>
            <button class="drawer-close" onclick="deleteCurrentJd()" title="删除岗位" style="color:var(--color-text-danger)"><i class="ti ti-trash" style="font-size:15px"></i></button>
            <button class="drawer-close" onclick="toggleDrawer()"><i class="ti ti-x" style="font-size:16px"></i></button>
          </div>
        </div>
        <div class="drawer-tabs">
          <button class="dtab on" id="tab-raw" onclick="switchTab('raw')">客户原话</button>
          <button class="dtab" id="tab-analysis" onclick="switchTab('analysis')">深度分析</button>
        </div>
        <div class="drawer-body" id="drawer-body"></div>
      </div>
    </div>
  </div>
</div>

<!-- JD 弹层 -->
<div class="modal-mask" id="jd-modal">
  <div class="modal">
    <div class="modal-head"><span class="modal-title" id="jd-modal-title">新建岗位</span><button class="drawer-close" onclick="closeJdModal()"><i class="ti ti-x" style="font-size:18px"></i></button></div>
    <div class="modal-body">
      <div class="field"><label>岗位名称 *</label><input id="f-jd-name" placeholder="如：金属粉末材料研发"></div>
      <div class="field"><label>公司 / 地点</label><input id="f-jd-co" placeholder="如：西安·某粉末制备商"></div>
      <div class="field"><label>客户原话（原始 JD）</label><textarea id="f-jd-raw" rows="6" placeholder="粘贴客户给的原始岗位描述…"></textarea></div>
      <div class="field"><label>深度分析（Skill1 输出的结构化 JSON）</label><textarea id="f-jd-analysis" rows="6" placeholder='可留空。若填写，请粘贴 JSON 格式：{"hardReqs":[...],"plusReqs":[...],"targetCos":[...],"insight":"...","warning":"...","dims":[{"n":"维度名","desc":"说明"}]}'></textarea><div class="hint">分析内容由我（Claude）生成后给你 JSON，粘贴到这里即可。留空则"深度分析"标签显示为空。</div></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeJdModal()">取消</button><button class="btn pri" onclick="saveJd()">保存</button></div>
  </div>
</div>

<!-- 简历弹层 -->
<div class="modal-mask" id="resume-modal">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">添加候选人简历</span><button class="drawer-close" onclick="closeResumeModal()"><i class="ti ti-x" style="font-size:18px"></i></button></div>
    <div class="modal-body">
      <div class="field"><label>姓名 *</label><input id="f-c-name" placeholder="如：于**"></div>
      <div style="display:flex;gap:10px">
        <div class="field" style="flex:1"><label>年龄</label><input id="f-c-age" type="number" placeholder="41"></div>
        <div class="field" style="flex:1"><label>年限</label><input id="f-c-yrs" type="number" placeholder="15"></div>
      </div>
      <div style="display:flex;gap:10px">
        <div class="field" style="flex:1"><label>当前职位</label><input id="f-c-title" placeholder="技术专家"></div>
        <div class="field" style="flex:1"><label>当前公司</label><input id="f-c-co" placeholder="东方润安集团"></div>
      </div>
      <div class="field"><label>原始简历 *</label><textarea id="f-c-raw" rows="7" placeholder="粘贴简历内容…"></textarea></div>
      <div class="field"><label>评分 JSON（可选，我打分后给你）</label><textarea id="f-c-score" rows="5" placeholder='可留空，先入库后再打分。格式：{"score":68,"summary":"...","dims":[{"n":"维度","s":80,"c":"说明"}]}'></textarea><div class="hint">留空则该候选人显示为"未打分"。把简历发给我，我返回这段 JSON，粘贴即可。</div></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeResumeModal()">取消</button><button class="btn pri" onclick="saveResume()">保存</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL="https://xorifobhzlydocyckawg.supabase.co";
const SUPABASE_KEY="sb_publishable_2KURwfnUV8ckOXuYZ3pJ0Q_SaumgsKd";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let JDS=[],CANDS={},JD_RAW={},JD_ANALYSIS={};
let activeJd=null,activeC=null,sortBy='score',drawerOpen=false,activeTab='raw',editingJdId=null;
const isMobile=()=>window.innerWidth<=768;

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function sc(s){if(s==null)return{bg:'var(--color-background-secondary)',tx:'var(--color-text-secondary)',fill:'var(--color-border-secondary)'};if(s>=80)return{bg:'var(--color-background-success)',tx:'var(--color-text-success)',fill:'#639922'};if(s>=65)return{bg:'var(--color-background-info)',tx:'var(--color-text-info)',fill:'#378ADD'};if(s>=50)return{bg:'var(--color-background-warning)',tx:'var(--color-text-warning)',fill:'#BA7517'};return{bg:'var(--color-background-danger)',tx:'var(--color-text-danger)',fill:'#E24B4A'};}

async function loadData(){
  try{
    const {data:jds,error:e1}=await sb.from('jds').select('*').order('created_at',{ascending:true});
    if(e1)throw e1;
    const {data:cands,error:e2}=await sb.from('candidates').select('*').order('added_at',{ascending:true});
    if(e2)throw e2;
    JDS=jds.map(j=>({id:j.id,name:j.name,co:j.co||''}));
    JD_RAW={};JD_ANALYSIS={};CANDS={};
    jds.forEach(j=>{JD_RAW[j.id]=j.raw_jd||'';JD_ANALYSIS[j.id]=j.analysis||null;CANDS[j.id]=[];});
    cands.forEach(c=>{
      if(!CANDS[c.jd_id])CANDS[c.jd_id]=[];
      CANDS[c.jd_id].push({id:c.id,name:c.name,age:c.age,title:c.title||'',co:c.co||'',yrs:c.yrs,score:c.score,summary:c.summary||'',dims:c.dims||[],raw:c.raw||'',addedAt:c.added_at});
    });
    document.getElementById('loading').style.display='none';
    if(JDS.length&&!activeJd){activeJd=JDS[0].id;}
    renderJdList();renderCList();renderDetail();updateTopbar();
  }catch(err){
    document.getElementById('loading').innerHTML='<span style="color:var(--color-text-danger)">加载失败：'+(err.message||err)+'</span>';
  }
}

function updateTopbar(){
  const mobile=isMobile();
  const backBtn=document.getElementById('back-btn');
  const titleEl=document.getElementById('topbar-title');
  const subEl=document.getElementById('topbar-sub');
  const total=JDS.reduce((s,j)=>(CANDS[j.id]||[]).length+s,0);
  subEl.textContent=JDS.length+'个岗位 · '+total+'位候选人';
  if(!mobile){backBtn.classList.remove('visible');titleEl.textContent='猎头工作台';return;}
  const ra=document.getElementById('right-area'),center=document.getElementById('center');
  if(ra.classList.contains('visible')){
    backBtn.classList.add('visible');
    document.getElementById('back-label').textContent='候选人';
    titleEl.textContent='';
  }
  else if(center.classList.contains('visible')){backBtn.classList.add('visible');document.getElementById('back-label').textContent='岗位';titleEl.textContent='';}
  else{backBtn.classList.remove('visible');titleEl.textContent='猎头工作台';}
}
function goBack(){
  const ra=document.getElementById('right-area'),center=document.getElementById('center');
  if(ra.classList.contains('visible')){ra.classList.remove('visible');if(drawerOpen){drawerOpen=false;document.getElementById('jd-drawer').classList.remove('open');document.getElementById('jd-btn-arrow').classList.remove('open');}}
  else if(center.classList.contains('visible')){center.classList.remove('visible');}
  updateTopbar();
}
function renderJdList(){
  const total=JDS.reduce((s,j)=>(CANDS[j.id]||[]).length+s,0);
  document.getElementById('topbar-sub').textContent=JDS.length+'个岗位 · '+total+'位候选人';
  if(!JDS.length){document.getElementById('jd-list').innerHTML='<div style="padding:20px;text-align:center;color:var(--color-text-tertiary);font-size:12px">还没有岗位<br>点右上角 +JD 创建</div>';return;}
  document.getElementById('jd-list').innerHTML=JDS.map(j=>{
    const list=CANDS[j.id]||[];const scored=list.filter(c=>c.score!=null);
    const avg=scored.length?Math.round(scored.reduce((s,c)=>s+c.score,0)/scored.length):null;
    return`<div class="jd-item${activeJd===j.id?' active':''}" onclick="selJd('${j.id}')"><div class="jd-item-left"><div class="jd-name">${j.name}</div><div class="jd-meta">${j.co?j.co+' · ':''}${list.length}人${avg!=null?' · 均'+avg+'分':''}</div></div><i class="ti ti-chevron-right" style="font-size:14px;color:var(--color-text-tertiary);flex-shrink:0"></i></div>`;
  }).join('');
}
function renderCList(){
  const jd=JDS.find(j=>j.id===activeJd);
  document.getElementById('lp-title').textContent=jd?jd.name:'—';
  const list=CANDS[activeJd]||[];const scored=list.filter(c=>c.score!=null);
  const avg=scored.length?Math.round(scored.reduce((s,c)=>s+c.score,0)/scored.length):null;
  document.getElementById('lp-meta').textContent=list.length+'人'+(avg!=null?' · 均'+avg+'分':'');
  const sorted=[...list].sort((a,b)=>sortBy==='score'?((b.score??-1)-(a.score??-1)):(new Date(a.addedAt)-new Date(b.addedAt)));
  if(!list.length){document.getElementById('clist').innerHTML='<div style="padding:24px;text-align:center;color:var(--color-text-tertiary);font-size:12px">还没有候选人<br>点上方"添加简历"</div>';return;}
  document.getElementById('clist').innerHTML=sorted.map(c=>{
    const col=sc(c.score);
    return`<div class="ccard${activeC===c.id?' sel':''}" onclick="selC('${c.id}')"><div class="av">${c.name[0]}</div><div class="cb"><div class="ct"><span class="cn">${c.name}</span><span class="bdg" style="background:${col.bg};color:${col.tx}">${c.score!=null?c.score+'分':'未打分'}</span></div><div class="cd">${c.co}${c.title?' · '+c.title:''}</div>${c.dims&&c.dims.length?`<div class="minibar-row">${c.dims.map(d=>`<div class="minibar"><div class="minibar-fill" style="width:${d.s}%;background:${sc(d.s).fill}"></div></div>`).join('')}</div>`:''}</div></div>`;
  }).join('');
}
function renderDetail(){
  const dp=document.getElementById('detail-panel');
  if(!activeC){dp.innerHTML='<div class="detail-empty"><i class="ti ti-user"></i><p>点击候选人查看详情</p></div>';return;}
  const c=(CANDS[activeJd]||[]).find(x=>x.id===activeC);
  if(!c){dp.innerHTML='<div class="detail-empty"><i class="ti ti-user"></i><p>点击候选人查看详情</p></div>';return;}
  const col=sc(c.score);
  dp.innerHTML=`<div class="detail-head"><div class="dh-top"><div class="dh-av">${c.name[0]}</div><div class="dh-info"><div class="dh-name">${c.name}</div><div class="dh-sub">${c.co}${c.title?' · '+c.title:''}${c.yrs?' · '+c.yrs+'年':''}</div></div><div class="dh-score"><div class="dh-score-num" style="color:${col.tx}">${c.score!=null?c.score:'—'}</div><div class="dh-score-lbl">综合评分</div></div></div><div class="info-row">${c.age?`<span class="info-tag"><i class="ti ti-cake" style="font-size:12px"></i>${c.age}岁</span>`:''}${c.yrs?`<span class="info-tag"><i class="ti ti-clock" style="font-size:12px"></i>${c.yrs}年经验</span>`:''}${c.co?`<span class="info-tag"><i class="ti ti-building" style="font-size:12px"></i>${c.co}</span>`:''}</div></div><div class="detail-body">${c.summary?`<div class="section"><div class="sec-title">AI 评语</div><div class="summary-box">${c.summary}</div></div>`:''}${c.dims&&c.dims.length?`<div class="section"><div class="sec-title">维度评分</div>${c.dims.map(d=>{const dc=sc(d.s);return`<div class="dim-row"><div class="dim-top"><span class="dim-name">${d.n}</span><span class="dim-score" style="color:${dc.tx}">${d.s}分</span></div><div class="dim-bar"><div class="dim-fill" style="width:${d.s}%;background:${dc.fill}"></div></div>${d.c?`<div class="dim-comment">${d.c}</div>`:''}</div>`;}).join('')}</div>`:''}<div class="section"><div class="sec-title">原始简历</div><div class="raw-box">${c.raw||'（无）'}</div></div></div><div class="detail-foot"><button class="btn-xs pri" onclick="copyForScoring('${c.id}')"><i class="ti ti-copy" style="font-size:11px"></i>复制简历去打分</button><button class="btn-xs danger" onclick="deleteCandidate('${c.id}')"><i class="ti ti-trash" style="font-size:11px"></i>删除</button></div>`;
}
function renderDrawer(){
  const jd=JDS.find(j=>j.id===activeJd);
  document.getElementById('drawer-title').textContent=(jd?.name||'岗位')+' · 岗位要求';
  const ana=JD_ANALYSIS[activeJd];
  if(activeTab==='raw'){document.getElementById('drawer-body').innerHTML=`<div class="raw-jd">${JD_RAW[activeJd]||'（未填写客户原话）'}</div>`;}
  else{
    if(!ana){document.getElementById('drawer-body').innerHTML='<div style="color:var(--color-text-tertiary);font-size:12px;padding:8px">暂无深度分析。点右上角编辑可补充。</div>';return;}
    document.getElementById('drawer-body').innerHTML=`${ana.hardReqs?`<div class="analysis-section"><div class="as-title">硬性门槛</div><div class="tag-row">${ana.hardReqs.map(r=>`<span class="tag must">${r}</span>`).join('')}</div></div>`:''}${ana.plusReqs?`<div class="analysis-section"><div class="as-title">加分项</div><div class="tag-row">${ana.plusReqs.map(r=>`<span class="tag good">${r}</span>`).join('')}</div></div>`:''}${ana.targetCos?`<div class="analysis-section"><div class="as-title">核心目标公司</div><div class="tag-row">${ana.targetCos.map(c=>`<span class="tag co">${c}</span>`).join('')}</div></div>`:''}${ana.insight?`<div class="analysis-section"><div class="as-title">深层洞察</div><div class="as-body">${ana.insight.replace(/\n/g,'<br>')}</div></div>`:''}${ana.warning?`<div class="analysis-section"><div class="as-title">注意事项</div><div class="warn-box">${ana.warning}</div></div>`:''}${ana.dims?`<div class="analysis-section"><div class="as-title">打分维度说明</div>${ana.dims.map(d=>`<div style="margin-bottom:8px"><span style="font-size:12px;font-weight:500">${d.n}</span><span style="font-size:12px;color:var(--color-text-secondary);margin-left:8px">${d.desc||''}</span></div>`).join('')}</div>`:''}`;
  }
}
function toggleDrawer(){drawerOpen=!drawerOpen;const ra=document.getElementById('right-area');if(isMobile()&&drawerOpen)ra.classList.add('visible');document.getElementById('jd-drawer').classList.toggle('open',drawerOpen);document.getElementById('jd-btn-arrow').classList.toggle('open',drawerOpen);if(drawerOpen)renderDrawer();updateTopbar();}
function switchTab(tab){activeTab=tab;document.getElementById('tab-raw').className='dtab'+(tab==='raw'?' on':'');document.getElementById('tab-analysis').className='dtab'+(tab==='analysis'?' on':'');renderDrawer();}
function selJd(id){activeJd=id;activeC=null;if(drawerOpen){drawerOpen=false;document.getElementById('jd-drawer').classList.remove('open');document.getElementById('jd-btn-arrow').classList.remove('open');}renderJdList();renderCList();renderDetail();if(isMobile()){document.getElementById('center').classList.add('visible');document.getElementById('right-area').classList.remove('visible');}updateTopbar();}
function selC(id){activeC=id;renderCList();renderDetail();if(isMobile())document.getElementById('right-area').classList.add('visible');updateTopbar();}
function setSort(by){sortBy=by;['score','date'].forEach(k=>{const el=document.getElementById('s-'+k);if(el)el.className='sort-btn'+(k===by?' on':'');});renderCList();}

/* ── JD 增删改 ── */
function openJdModal(){editingJdId=null;document.getElementById('jd-modal-title').textContent='新建岗位';document.getElementById('f-jd-name').value='';document.getElementById('f-jd-co').value='';document.getElementById('f-jd-raw').value='';document.getElementById('f-jd-analysis').value='';document.getElementById('jd-modal').classList.add('show');}
function closeJdModal(){document.getElementById('jd-modal').classList.remove('show');}
function editCurrentJd(){if(!activeJd)return;const jd=JDS.find(j=>j.id===activeJd);editingJdId=activeJd;document.getElementById('jd-modal-title').textContent='编辑岗位';document.getElementById('f-jd-name').value=jd.name;document.getElementById('f-jd-co').value=jd.co||'';document.getElementById('f-jd-raw').value=JD_RAW[activeJd]||'';document.getElementById('f-jd-analysis').value=JD_ANALYSIS[activeJd]?JSON.stringify(JD_ANALYSIS[activeJd],null,2):'';document.getElementById('jd-modal').classList.add('show');}
async function saveJd(){
  const name=document.getElementById('f-jd-name').value.trim();
  if(!name){toast('请填岗位名称');return;}
  const co=document.getElementById('f-jd-co').value.trim();
  const raw=document.getElementById('f-jd-raw').value.trim();
  const anaStr=document.getElementById('f-jd-analysis').value.trim();
  let analysis=null;
  if(anaStr){try{analysis=JSON.parse(anaStr);}catch(e){toast('深度分析 JSON 格式错误');return;}}
  try{
    if(editingJdId){
      const {error}=await sb.from('jds').update({name,co,raw_jd:raw,analysis}).eq('id',editingJdId);
      if(error)throw error;toast('已更新');
    }else{
      const id='j_'+Date.now();
      const {error}=await sb.from('jds').insert({id,name,co,raw_jd:raw,analysis});
      if(error)throw error;activeJd=id;toast('岗位已创建');
    }
    closeJdModal();await loadData();
  }catch(err){toast('保存失败：'+(err.message||err));}
}
async function deleteCurrentJd(){
  if(!activeJd)return;
  const jd=JDS.find(j=>j.id===activeJd);
  if(!confirm('删除岗位「'+jd.name+'」及其所有候选人？此操作不可恢复。'))return;
  try{const {error}=await sb.from('jds').delete().eq('id',activeJd);if(error)throw error;activeJd=null;toast('已删除');await loadData();}
  catch(err){toast('删除失败：'+(err.message||err));}
}

/* ── 简历增删 ── */
function openResumeModal(){if(!activeJd){toast('请先选择岗位');return;}['name','age','yrs','title','co','raw','score'].forEach(f=>{const el=document.getElementById('f-c-'+f);if(el)el.value='';});document.getElementById('resume-modal').classList.add('show');}
function closeResumeModal(){document.getElementById('resume-modal').classList.remove('show');}
async function saveResume(){
  const name=document.getElementById('f-c-name').value.trim();
  const raw=document.getElementById('f-c-raw').value.trim();
  if(!name||!raw){toast('姓名和简历必填');return;}
  let score=null,summary=null,dims=null;
  const scoreStr=document.getElementById('f-c-score').value.trim();
  if(scoreStr){try{const o=JSON.parse(scoreStr);score=o.score??null;summary=o.summary||null;dims=o.dims||null;}catch(e){toast('评分 JSON 格式错误');return;}}
  const rec={id:'c_'+Date.now(),jd_id:activeJd,name,age:parseInt(document.getElementById('f-c-age').value)||null,title:document.getElementById('f-c-title').value.trim(),co:document.getElementById('f-c-co').value.trim(),yrs:parseInt(document.getElementById('f-c-yrs').value)||null,score,summary,dims,raw};
  try{const {error}=await sb.from('candidates').insert(rec);if(error)throw error;toast('候选人已添加');closeResumeModal();await loadData();}
  catch(err){toast('保存失败：'+(err.message||err));}
}
async function deleteCandidate(id){
  if(!confirm('删除该候选人？'))return;
  try{const {error}=await sb.from('candidates').delete().eq('id',id);if(error)throw error;activeC=null;toast('已删除');await loadData();}
  catch(err){toast('删除失败：'+(err.message||err));}
}
function copyForScoring(id){
  const c=(CANDS[activeJd]||[]).find(x=>x.id===id);
  const jd=JDS.find(j=>j.id===activeJd);
  const txt='【岗位】'+jd.name+'\n【JD要求】\n'+(JD_RAW[activeJd]||'')+'\n\n【候选人简历】\n'+c.raw+'\n\n请按此JD对该候选人打分，返回JSON：{"score":数字,"summary":"评语","dims":[{"n":"维度","s":分数,"c":"说明"}]}';
  navigator.clipboard.writeText(txt).then(()=>toast('已复制，发给Claude打分后把JSON填回')).catch(()=>toast('复制失败'));
}

loadData();
window.addEventListener('resize',updateTopbar);
</script>
</body>
</html>
